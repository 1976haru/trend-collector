# Render Blueprint — Trend Collector (내부 MVP)
# https://render.com/docs/blueprint-spec
#
# Render 대시보드에서 "New > Blueprint" → 이 저장소를 선택하면
# 아래 정의대로 Web Service 가 자동 생성됩니다.
#
# 비밀값(ADMIN_PASSWORD, SMTP_*, OPENAI_API_KEY 등) 은 Render UI 에서 직접 입력하세요.
# (이 파일에는 sync: false 로 표시되어 있어 Blueprint 생성 시 입력 프롬프트가 뜹니다.)

services:
  - type: web
    name: trend-collector
    runtime: node
    plan: free                       # 운영시 starter 이상 권장 (free 는 15분 idle 시 sleep)
    region: singapore                # 한국에서 가장 가까운 권역
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health

    # 영구 디스크 — 리포트(JSON) 와 config 를 보존하려면 활성화 (Render 유료 플랜 필요)
    # disk:
    #   name: trend-data
    #   mountPath: /var/data
    #   sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Seoul
      - key: REPORT_TIME
        value: "09:00"               # 매일 KST 09:00 자동 수집·발송

      # 영구 디스크를 사용하는 경우 활성화
      # - key: DATA_DIR
      #   value: /var/data

      # 직원 접근 비밀번호 — Render UI 에서 직접 입력
      - key: ADMIN_PASSWORD
        sync: false

      # SMTP — Render UI 에서 직접 입력
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # 메일 본문에 들어갈 절대 URL (예: https://trend-collector.onrender.com)
      - key: BASE_URL
        sync: false

      # 기능 개선 제안 메일 수신 (관리자)
      - key: FEEDBACK_TO_EMAIL
        sync: false

      # 추후 LLM 요약을 추가할 때 사용
      - key: OPENAI_API_KEY
        sync: false

      # 네이버 뉴스 검색 API (국내 매체 커버리지)
      - key: NAVER_ENABLED
        value: "false"
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false

      # 카카오톡 알림 (스텁 — 기본 OFF)
      - key: KAKAO_ENABLED
        value: "false"
      - key: KAKAO_ACCESS_TOKEN
        sync: false
      - key: KAKAO_TEMPLATE_ID
        sync: false
      - key: KAKAO_TARGET_UUID
        sync: false

      # Puppeteer 캐시 경로 (디스크가 있다면 영구 보관)
      # - key: PUPPETEER_CACHE_DIR
      #   value: /var/data/puppeteer-cache
