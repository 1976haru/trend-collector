<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trend Collector" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>Trend Collector — 내부 직원용 언론보도 시스템</title>
    <meta name="description" content="키워드 기반 전국 언론사 뉴스 자동 수집 / 분석 / PDF·메일 발송 (내부 직원 전용)" />

    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body {
        font-family: 'IBM Plex Sans KR', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f0ede8;
        color: #0d1117;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }
      @keyframes spin   { to { transform: rotate(360deg); } }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

      button, input, select, textarea { font-family: inherit; font-size: inherit; }

      /* 모바일에서 입력 필드 줌 방지 (16px 이상) */
      input, select, textarea { font-size: 16px; }

      /* 링크 기본 */
      a { color: #2563eb; text-decoration: none; }
      a:hover { text-decoration: underline; }

      /* 모바일 반응형 — 768px 이하에서 여백 / 폰트 / 그리드 축소 */
      @media (max-width: 768px) {
        main { padding: 8px !important; }
      }
      @media (max-width: 480px) {
        /* 4열 통계 그리드를 2열로 */
        [data-stats-grid] { grid-template-columns: repeat(2, 1fr) !important; }
        /* 매체 행 — 라벨/바/카운트 그리드 축소 */
        [data-media-row] { grid-template-columns: 90px 1fr 50px !important; }
      }

      /* 안전영역 (iPhone 노치) */
      header { padding-left: max(14px, env(safe-area-inset-left)) !important;
               padding-right: max(14px, env(safe-area-inset-right)) !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
